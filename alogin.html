<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>WiFi De Tsararano - Connecté</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="theme.js"></script>
    <script>
        // Parse MikroTik variables from URL parameters
        const params = new URLSearchParams(window.location.search);
        const LINK_REDIRECT = params.get('link-redirect') || params.get('link-orig') || '';
        const LINK_STATUS   = params.get('link-status')   || '';
        const POPUP         = params.get('popup')         || '';

        function startClock() {
            if (POPUP === 'true' && LINK_STATUS) {
                open(LINK_STATUS, 'hotspot_status', 'toolbar=0,location=0,directories=0,status=0,menubars=0,resizable=1,width=290,height=200');
            }
            if (LINK_REDIRECT) {
                location.href = unescape(LINK_REDIRECT);
            }
        }
    </script>
</head>

<body onload="startClock()">
    <div class="ie-fixMinHeight">
        <div class="main">
            <div class="wrap">

                <h1 style="margin-top: 40px; margin-bottom: 20px; text-align:center;">
                    Vous êtes connecté
                </h1>

                <h1 style="margin-top: 40px; margin-bottom: 20px; text-align:center;">
                    TONGASOA
                </h1>

            </div>
        </div>
    </div>
</body>
</html>
