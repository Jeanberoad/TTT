<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotspot - Temps Presque Épuisé</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('img/GameOverSoon.jpeg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            overflow: hidden;
        }

        /* Superposition sombre pour la lisibilité */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ff4d4d;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        /* Le conteneur du compteur avec ses nouveaux contours */
        .timer-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto;
        }

        .timer-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            background: rgba(20, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            /* L'aura rouge du battement de coeur */
            animation: heartbeat 1.5s infinite ease-in-out;
            position: relative;
            z-index: 2;
        }

        /* Anneau intérieur pointillé tournant */
        .timer-wrapper::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 77, 77, 0.8);
            animation: spin 15s linear infinite;
            z-index: 1;
        }

        /* Anneau extérieur fin tournant dans l'autre sens */
        .timer-wrapper::after {
            content: '';
            position: absolute;
            top: -12px; left: -12px; right: -12px; bottom: -12px;
            border-radius: 50%;
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-top: 2px solid rgba(255, 77, 77, 1);
            animation: spin-reverse 8s linear infinite;
            z-index: 1;
        }

        #countdown {
            font-size: 3.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
        }

        .label {
            font-size: 0.9rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Animations */
        @keyframes heartbeat {
            0% { box-shadow: 0 0 15px 5px rgba(255, 0, 0, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 40px 15px rgba(255, 0, 0, 0.1); transform: scale(1.02); }
            100% { box-shadow: 0 0 15px 5px rgba(255, 0, 0, 0.4); transform: scale(1); }
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }

        .warning-text {
            margin-top: 40px;
            font-weight: 300;
            font-size: 1.1rem;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 0, 0.2), transparent);
            padding: 10px 0;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="content">
        <h1>Attention !</h1>
        
        <div class="timer-wrapper">
            <div class="timer-container">
                <div id="countdown">--:--</div>
                <div class="label">Restant</div>
            </div>
        </div>

        <div class="warning-text">
            Il vous reste peu de temps de connexion.
        </div>
    </div>

    <script>
        // Récupération de la variable MikroTik
        let mikrotikTimeStr = "$(session-time-left)"; 

        // Fonction pour convertir le format MikroTik (ex: "4m30s", "1h2m", "00:04:30") en secondes
        function parseMikrotikTime(str) {
            // Si la variable n'est pas remplacée par MikroTik (test en local), on met 5 minutes par défaut
            if (!str || str.startsWith('$')) return 300; 
            
            let totalSeconds = 0;
            
            // Si le format est "XXhXXmXXs"
            const regex = /(?:(\d+)h)?(?:(\d+)m)?(?:(\d+)s)?/;
            const matches = str.match(regex);
            
            if (matches && (matches[1] || matches[2] || matches[3])) {
                if (matches[1]) totalSeconds += parseInt(matches[1]) * 3600;
                if (matches[2]) totalSeconds += parseInt(matches[2]) * 60;
                if (matches[3]) totalSeconds += parseInt(matches[3]);
            } 
            // Si le format est "HH:MM:SS"
            else if (str.includes(':')) {
                let parts = str.split(':');
                let s = 0, m = 1;
                while (parts.length > 0) {
                    s += m * parseInt(parts.pop(), 10);
                    m *= 60;
                }
                totalSeconds = s;
            }
            
            return totalSeconds > 0 ? totalSeconds : 300;
        }

        let timeInSeconds = parseMikrotikTime(mikrotikTimeStr);
        const countdownElement = document.getElementById('countdown');

        function updateCountdown() {
            if (timeInSeconds <= 0) {
                countdownElement.innerHTML = "00:00";
                return;
            }

            const minutes = Math.floor(timeInSeconds / 60);
            let seconds = timeInSeconds % 60;

            // Ajoute un zéro devant si les secondes < 10
            seconds = seconds < 10 ? '0' + seconds : seconds;
            
            // Affiche MM:SS (ou HH:MM:SS si plus d'une heure, même si peu probable ici)
            if (minutes > 59) {
                const hours = Math.floor(minutes / 60);
                const remainingMinutes = minutes % 60;
                countdownElement.innerHTML = `${hours}:${remainingMinutes < 10 ? '0' + remainingMinutes : remainingMinutes}:${seconds}`;
            } else {
                countdownElement.innerHTML = `${minutes < 10 ? '0' + minutes : minutes}:${seconds}`;
            }

            timeInSeconds--;
        }

        // Lancement immédiat puis boucle d'une seconde
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
