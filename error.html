<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>Erreur - WiFi de Tsararano</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="theme.js"></script>
</head>
<body>
    <div class="main-card">
        <div class="header">
            <h1 style="background: linear-gradient(to right, #ff4444, #ff8888); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Oups !</h1>
            <p>Une erreur est survenue</p>
        </div>

        <div class="error-msg">
            $(error)
        </div>

        <p class="info-text">Il semble y avoir un problème avec votre connexion.</p>

        <a href="$(link-login)" class="btn-link">Retour à l'accueil</a>

        <p class="footer-text" style="margin-top: 30px;">WiFi de Tsararano - Support technique</p>
    </div>
</body>
</html>
