<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />   
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="-1">
<title>Déconnexion - WiFi de Tsararano</title>
<link rel="stylesheet" href="css/style.css">
    <script src="theme.js"></script>
<script>
    function openLogin() {
        if (window.name != 'hotspot_logout') return true;
        open('$(link-login)', '_blank', '');
        window.close();
        return false;
    }
</script>
</head>
<body>
    <div class="main-card">
        <div class="header">
            <h1>Déconnecté</h1>
            <p>Votre session est terminée</p>
        </div>

        <table>  
            <tr><td>Utilisateur</td><td>$(username)</td></tr>
            <tr><td>Adresse IP</td><td>$(ip)</td></tr>
            <tr><td>Adresse MAC</td><td>$(mac)</td></tr>
            <tr><td>Durée session</td><td>$(uptime)</td></tr>
            $(if session-time-left)
            <tr><td>Temps restant</td><td>$(session-time-left)</td></tr>
            $(endif)
            <tr><td>Upload / Download</td><td>$(bytes-in-nice) / $(bytes-out-nice)</td></tr>
        </table>

        <form action="$(link-login)" name="login" onSubmit="return openLogin()">
            <button type="submit" class="btn-submit">Se reconnecter</button>
        </form>

        <p class="footer-text">Merci d'avoir utilisé notre WiFi</p>
    </div>
</body>
</html>
