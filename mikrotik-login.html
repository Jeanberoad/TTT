<!DOCTYPE html>
<!--
    FICHIER À INSTALLER SUR LE ROUTEUR MIKROTIK
    ============================================
    Copiez ce fichier dans Winbox > Files et nommez-le "login.html".
    Remplacez "VOTRE-URL-REPLIT" par l'URL réelle de votre projet Replit
    (ex: https://mon-projet.replit.app)

    Ce fichier redirige l'utilisateur vers le portail hébergé sur Replit
    en passant toutes les variables MikroTik dans l'URL.
-->
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>Redirection...</title>
    <meta http-equiv="refresh" content="0; url=https://VOTRE-URL-REPLIT/login.html?link-login-only=$(link-login-only-esc)&link-orig=$(link-orig-esc)&chap-id=$(chap-id)&chap-challenge=$(chap-challenge)&mac=$(mac-esc)&trial=$(trial)&error=$(error-esc)&username=$(username-esc)&link-status=$(link-status-esc)&popup=$(popup)">
</head>
<body>
    <p>Redirection en cours...</p>
    <script>
        // Fallback JavaScript redirect (si meta refresh ne fonctionne pas)
        var base = "https://VOTRE-URL-REPLIT/login.html";
        var vars = [
            "link-login-only=$(link-login-only-esc)",
            "link-orig=$(link-orig-esc)",
            "chap-id=$(chap-id)",
            "chap-challenge=$(chap-challenge)",
            "mac=$(mac-esc)",
            "trial=$(trial)",
            "error=$(error-esc)",
            "username=$(username-esc)",
            "link-status=$(link-status-esc)",
            "popup=$(popup)"
        ].join("&");
        window.location.replace(base + "?" + vars);
    </script>
</body>
</html>
